name: Android Build & Optimize Workflow

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许在 GitHub 网页端手动触发构建

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu' # Zulu 或 Temurin 发行版非常适合 Android 编译

      - name: 设置 Gradle 与缓存优化
        uses: gradle/actions/setup-gradle@v3
        # 这个官方 Action 会自动处理依赖和构建缓存，极大提升非首次构建的速度

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 编译 Debug APK
        # --no-daemon 节省 CI 内存；--build-cache 和 --parallel 提升编译速度
        run: ./gradlew assembleDebug --no-daemon --build-cache --parallel

      - name: 收集并上传 APK 产物 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Re-WearBili-Debug-APK
          # 请根据实际的输出路径调整，通常是这个路径
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7 # 编译好的文件保留天数
